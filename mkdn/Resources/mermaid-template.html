<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: transparent; width: 100%; }
        body { overflow: visible; }
        #diagram { display: block; width: 100%; }
        #diagram svg { display: block; width: 100%; height: auto; margin: 0 auto; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(128, 128, 128, 0.5); }
        ::-webkit-scrollbar-corner { background: transparent; }
        foreignObject div { overflow: hidden !important; }
        *:focus { outline: none; }
    </style>
    <script src="mermaid.min.js"></script>
</head>
<body>
    <div id="diagram">
        <pre class="mermaid">__MERMAID_CODE__</pre>
    </div>
    <script>
        var originalCode = `__MERMAID_CODE_JS__`;

        if (typeof mermaid === 'undefined') {
            window.webkit.messageHandlers.renderError.postMessage({
                message: 'mermaid.min.js failed to load. Check that the resource is bundled correctly.'
            });
        } else {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'base',
                themeVariables: __THEME_VARIABLES__,
                securityLevel: 'strict',
                flowchart: { htmlLabels: true },
            });

            var currentThemeVars = __THEME_VARIABLES__;
            var resizeObserver = null;
            var resizeRAF = null;

            function sendSizeReport() {
                var svg = document.querySelector('#diagram svg');
                if (svg) {
                    var bbox = svg.getBoundingClientRect();
                    if (bbox.width > 0) {
                        var intrinsicWidth = bbox.width;
                        var vb = svg.getAttribute('viewBox');
                        if (vb) {
                            var parts = vb.split(/[\s,]+/);
                            if (parts.length >= 3) {
                                var vbW = parseFloat(parts[2]);
                                if (vbW > 0) intrinsicWidth = vbW;
                            }
                        }
                        window.webkit.messageHandlers.sizeReport.postMessage({
                            width: bbox.width,
                            height: bbox.height,
                            intrinsicWidth: intrinsicWidth
                        });
                    }
                }
            }

            function installResizeObserver() {
                if (resizeObserver) resizeObserver.disconnect();
                var target = document.querySelector('#diagram svg') || document.getElementById('diagram');
                if (!target) return;
                resizeObserver = new ResizeObserver(function() {
                    if (resizeRAF) cancelAnimationFrame(resizeRAF);
                    resizeRAF = requestAnimationFrame(function() {
                        resizeRAF = null;
                        sendSizeReport();
                    });
                });
                resizeObserver.observe(target);
            }

            async function render() {
                try {
                    await mermaid.run({ querySelector: '.mermaid' });
                    var svg = document.querySelector('#diagram svg');
                    if (svg) {
                        sendSizeReport();
                        installResizeObserver();
                        window.webkit.messageHandlers.renderComplete.postMessage({});
                    } else {
                        window.webkit.messageHandlers.renderError.postMessage({
                            message: 'Mermaid.run() completed but no SVG element was produced.'
                        });
                    }
                } catch (error) {
                    window.webkit.messageHandlers.renderError.postMessage({
                        message: error.message || String(error)
                    });
                }
            }

            window.reRenderWithTheme = function(newThemeVars) {
                var svg = document.querySelector('#diagram svg');
                if (!svg) {
                    // No SVG yet — fall back to full re-render.
                    mermaid.initialize({
                        startOnLoad: false,
                        theme: 'base',
                        themeVariables: newThemeVars,
                        securityLevel: 'strict',
                        flowchart: { htmlLabels: true },
                    });
                    var container = document.getElementById('diagram');
                    var pre = document.createElement('pre');
                    pre.className = 'mermaid';
                    pre.textContent = originalCode;
                    container.appendChild(pre);
                    render();
                    currentThemeVars = newThemeVars;
                    return;
                }

                // Build a deduplicated color swap map. A hex value is safe to
                // swap only when every key that uses it agrees on the target.
                // If key A says #X -> #Y but key B says #X -> #X (no change),
                // #X is ambiguous and must be skipped to avoid corrupting the
                // non-changing instances (e.g. borders that share a hex with
                // titleColor across themes).
                var colorMap = {};
                var ambiguous = {};
                for (var key in currentThemeVars) {
                    var oldC = currentThemeVars[key];
                    var newC = newThemeVars[key];
                    if (!oldC || !newC) continue;
                    if (oldC in colorMap) {
                        if (colorMap[oldC] !== newC) ambiguous[oldC] = true;
                    } else {
                        colorMap[oldC] = newC;
                    }
                }
                // Remove ambiguous and no-op entries.
                for (var c in colorMap) {
                    if (ambiguous[c] || colorMap[c] === c) delete colorMap[c];
                }

                // Two-pass placeholder replacement prevents chain swaps
                // (where a new color matches another old color).
                var html = svg.outerHTML;
                var placeholders = {};
                var idx = 0;
                for (var old in colorMap) {
                    var ph = '__MKDN_T' + idx + '__';
                    placeholders[ph] = colorMap[old];
                    html = html.split(old).join(ph);
                    var lo = old.toLowerCase();
                    var up = old.toUpperCase();
                    if (lo !== old) html = html.split(lo).join(ph);
                    if (up !== old) html = html.split(up).join(ph);
                    idx++;
                }
                for (var ph in placeholders) {
                    html = html.split(ph).join(placeholders[ph]);
                }

                svg.outerHTML = html;
                currentThemeVars = newThemeVars;
                sendSizeReport();
                installResizeObserver();
            };

            render();
        }
    </script>
</body>
</html>
